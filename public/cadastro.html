<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta | NextLynx Tech - Mentoria e Apoio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>

       /* ==========================================================================
   1. CORREÇÃO DE SCROLL E COMPORTAMENTO GLOBAL DO BODY
   ========================================================================== */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;                /* Impede scroll horizontal de vez */
    overscroll-behavior: none;         /* Desativa o "bounce" elástico nas bordas */
    -webkit-overflow-scrolling: touch;  /* Melhora o scroll suave no iOS */
    touch-action: pan-y pinch-zoom;    /* Permite scroll vertical + zoom, bloqueia horizontal */
}

:root {
    --primary: #6a11cb;
    --primary-light: #a55eea;
    --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --gradient-bg: linear-gradient(135deg, #000000 0%, #111111 100%); /* Fundo escuro igual ao login */
    --dark: #2c3e50;
    --light: #f8f9fa;
    --success: #38ef7d;
    --danger: #dc3545;
}

body {
    background: var(--gradient-bg) !important; /* Força o fundo escuro do sistema */
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(1rem, 5vw, 2rem);
    position: relative;
}

/* ==========================================================================
   2. CONTAINER DO CADASTRO (SIGNUP)
   ========================================================================== */
.signup-container {
    background: rgba(255, 255, 255, 0.98);
    border-radius: clamp(15px, 5vw, 25px);
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.55);
    max-width: clamp(320px, 90vw, 500px);
    width: 100%;
    animation: fadeInUp 0.7s cubic-bezier(0.25, 1, 0.5, 1);
    overflow: hidden;
}

.signup-header {
    background: var(--gradient-primary);
    padding: clamp(2rem, 8vw, 3.5rem) clamp(1.2rem, 5vw, 2rem) clamp(1.8rem, 7vw, 2.5rem);
    text-align: center;
}

.signup-logo {
    height: clamp(60px, 20vw, 90px);
    width: auto;
    max-width: 100%;
    object-fit: contain;
    margin-bottom: clamp(0.8rem, 3vw, 1.2rem);
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
}

.signup-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(1.8rem, 7vw, 2.4rem);
    margin-bottom: clamp(0.3rem, 2vw, 0.5rem);
    text-shadow: 0 3px 10px rgba(0,0,0,0.4);
    letter-spacing: -0.5px;
}

.signup-subtitle {
    font-size: clamp(0.95rem, 4vw, 1.15rem);
    opacity: 0.92;
    margin: 0;
}

.signup-body {
    padding: clamp(1.8rem, 6vw, 2.5rem);
}

/* ==========================================================================
   3. ELEMENTOS DE FORMULÁRIO (INPUTS, SELETS E BOTÕES)
   ========================================================================== */
.form-label {
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 0.5rem;
    font-size: clamp(0.9rem, 3.5vw, 1rem);
}

/* Ajuste para aninhar perfeitamente os ícones e campos em grupos do Bootstrap */
.input-group {
    border-radius: 15px;
    overflow: hidden;
}

.input-group-text {
    background: #f1f3f5;
    border: 1px solid #d1d8e0;
    border-right: none;
    color: #8420d4;
    padding: 0 1.1rem;
}

.form-control, .form-select {
    border-radius: 0 15px 15px 0 !important; /* Encaixe correto com o ícone lateral */
    padding: clamp(0.7rem, 3vw, 0.85rem) clamp(1rem, 4vw, 1.25rem);
    border: 1px solid #d1d8e0;
    transition: all 0.3s ease;
    font-size: clamp(0.95rem, 4vw, 1rem);
    color: var(--dark);
}

/* Garante os cantos corretos caso existam inputs sem ícone lateral no formulário */
form :not(.input-group) > .form-control,
form :not(.input-group) > .form-select {
    border-radius: 15px !important;
}

.form-control:focus, .form-select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 0.25rem rgba(106,17,203,0.15);
    outline: none;
}

.btn-signup {
    background: var(--gradient-primary);
    color: white;
    font-weight: 700;
    font-size: clamp(1rem, 4vw, 1.1rem);
    padding: clamp(0.8rem, 3vw, 1rem) clamp(1.5rem, 5vw, 2rem);
    border-radius: 50px;
    border: none;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(106,17,203,0.3);
    width: 100%;
    min-height: 48px; /* Altura ideal de clique mobile recomendada pela Google */
}

.btn-signup:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(106,17,203,0.45);
    background: var(--primary-light);
}

.btn-signup:active {
    transform: translateY(-1px);
}

/* Link interno para voltar ao Login */
.link-login {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
}

.link-login:hover {
    color: var(--primary-light);
    text-decoration: underline;
}

.alert {
    border-radius: 15px;
    margin-top: 1.2rem;
    font-size: clamp(0.9rem, 3.5vw, 0.95rem);
}

/* ==========================================================================
   4. ANIMAÇÕES E TRANSICÕES
   ========================================================================== */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ==========================================================================
   5. AJUSTES FINOS PARA TELAS ULTRA-PEQUENAS E POUPANÇA DE ALTURA
   ========================================================================== */
@media (max-width: 576px) {
    .signup-container { 
        margin: 0.5rem; 
        border-radius: 20px; 
    }
    .signup-header { 
        padding: clamp(2rem, 8vw, 2.5rem) 1.5rem 2rem; 
    }
    .signup-body { 
        padding: 1.8rem 1.5rem 2.5rem; 
    }
}

@media (max-width: 400px) {
    .signup-title { 
        font-size: 1.6rem; 
    }
    .signup-subtitle { 
        font-size: 0.9rem; 
    }
}

/* Se a altura do visor for muito pequena (ex: telemóvel deitado), ativa scroll saudável */
@media (max-height: 700px) {
    body {
        align-items: flex-start;
    }
    .signup-container {
        margin-top: 1.5rem;
        margin-bottom: 1.5rem;
    }
}
    </style>
</head>
<body>

    
<div class="signup-container">
        <div class="signup-header">
            <img src="img/logo1.png" alt="NextLynx Tech" class="signup-logo">
            <h1 class="signup-title">Criar Conta</h1>
            <p class="signup-subtitle">Junte-se à nossa comunidade de mentoria e apoio</p>
        </div>

        <div class="signup-body">
            <form id="signupForm">
                <div class="mb-4 position-relative">
                    <label for="nomeSignup" class="form-label">Nome Completo</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="nomeSignup" placeholder="Ex: João Silva" required autofocus>
                    </div>
                </div>

                <div class="mb-4 position-relative">
                    <label for="emailSignup" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="emailSignup" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="mb-4 position-relative">
                    <label for="senhaSignup" class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="senhaSignup" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                </div>

                <div class="mb-4 position-relative">
                    <label for="confirmSenha" class="form-label">Confirmar Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control" id="confirmSenha" placeholder="Repita a senha" required>
                    </div>
                </div>

                <div class="d-flex justify-content-start align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="showPasswords">
                        <label class="form-check-label small" for="showPasswords">Mostrar senhas</label>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="termos" required>
                    <label class="form-check-label small" for="termos">
                        Concordo com os <a href="termos.html" target="_blank" class="link-login">Termos de Uso</a> e <a href="politica-privacidade.html" target="_blank" class="link-login">Política de Privacidade</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-signup">
                    <i class="fas fa-user-plus me-2"></i> Criar Minha Conta
                </button>

                <div id="msgSignup" class="mt-3"></div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                    Já tem conta? 
                    <a href="login.html" class="link-login">Entrar agora</a>
                </p>
            </div>
        </div>
    </div>

<script>
    const checkboxShow = document.getElementById('showPasswords');
    const inputSenha = document.getElementById('senhaSignup');
    const inputConfirmar = document.getElementById('confirmSenha');

    checkboxShow.addEventListener('change', function() {
        const type = this.checked ? 'text' : 'password';
        inputSenha.type = type;
        inputConfirmar.type = type;
    });
</script>

    <!-- Script Supabase Signup - CORRIGIDO -->
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        const supabase = createClient(
            'https://qgbblhwojxuknlhkeusy.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmJsaHdvanh1a25saGtldXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5NTc1NjYsImV4cCI6MjA3ODUzMzU2Nn0.YpI8xjMqpwJSjHnrvOHfABnyMeIfxsLGJNeXrFoB3p0'
        );

        const msg = document.getElementById('msgSignup');

        function showMsg(text, type = 'info') {
            msg.innerHTML = `<div class="alert alert-${type} mt-3">${text}</div>`;
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nomeSignup').value.trim();
            const email = document.getElementById('emailSignup').value.trim();
            const senha = document.getElementById('senhaSignup').value;
            const confirmSenha = document.getElementById('confirmSenha').value;

            if (senha !== confirmSenha) {
                showMsg('As senhas não coincidem.', 'danger');
                return;
            }

            showMsg('Criando conta...', 'info');

            // 1. Criar conta no Authentication
            const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                email,
                password: senha,
                options: { data: { nome } }
            });

            if (signUpError) {
                showMsg(signUpError.message, 'danger');
                return;
            }

            const userId = signUpData.user.id;

            // 2. Inserir automaticamente na tabela perfis com role = 'aluno'
            const { error: perfilError } = await supabase
                .from('perfis')
                .insert({
                    id: userId,
                    nome: nome,
                    email: email,
                    role: 'aluno'
                });

            if (perfilError) {
                console.error('Erro ao criar perfil:', perfilError);
                showMsg('Conta criada, mas perfil não foi salvo. Contacta o administrador.', 'warning');
            } else {
                showMsg('Conta criada com sucesso!<br>Verifique seu email para confirmar.', 'success');
            }

            // Redireciona para login
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2800);
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
