<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | NextLynx Tech - Área de Mentoria e Apoio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>


        /* CORREÇÃO DE SCROLL TREMENTE / ABANAR EM TELEMÓVEL */
/* ==========================================================================
   1. CORREÇÃO DE SCROLL E COMPORTAMENTO GLOBAL DO BODY
   ========================================================================== */
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;                /* Impede scroll horizontal de vez */
    overscroll-behavior: none;         /* Desativa o "bounce" elástico nas bordas */
    -webkit-overflow-scrolling: touch;  /* Melhora o scroll suave no iOS */
    touch-action: pan-y pinch-zoom;    /* Permite scroll vertical + zoom, bloqueia horizontal */
}

:root {
    --primary: #6a11cb;
    --primary-light: #a55eea;
    --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --gradient-bg: linear-gradient(135deg, #000000 0%, #111111 100%); /* Fundo escuro premium */
    --dark: #2c3e50;
    --light: #f8f9fa;
    --success: #38ef7d;
    --danger: #dc3545;
}

body {
    background: var(--gradient-bg) !important; /* Força o fundo escuro do sistema */
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
}

/* ==========================================================================
   2. CONTAINER DO LOGIN (GLASSMORPHISM / NEUMORPHISM LEVE)
   ========================================================================== */
.login-container {
    background: rgba(255, 255, 255, 0.98);
    border-radius: 25px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
    overflow: hidden;
    max-width: 460px;
    width: 100%;
    animation: fadeInUp 0.7s cubic-bezier(0.25, 1, 0.5, 1);
}

.login-header {
    background: var(--gradient-primary);
    padding: 3.5rem 2rem 2.5rem;
    text-align: center;
    position: relative;
}

.login-logo {
    height: 90px;
    width: auto;
    max-width: 100%;
    object-fit: contain;
    margin-bottom: 1.2rem;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
}

.login-title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 2.2rem;
    margin-bottom: 0.4rem;
    text-shadow: 0 3px 10px rgba(0,0,0,0.4);
    letter-spacing: -0.5px;
}

.login-subtitle {
    font-size: 1.1rem;
    opacity: 0.92;
    margin: 0;
}

.login-body {
    padding: 2.5rem 2.5rem 3rem;
}

/* ==========================================================================
   3. ESTILIZAÇÃO DOS INPUTS E BOTÕES
   ========================================================================== */
.form-label {
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
}

/* Garante o arredondamento perfeito junto com o ícone do Bootstrap */
.input-group {
    border-radius: 15px;
    overflow: hidden;
}

.input-group-text {
    background: #f1f3f5;
    border: 1px solid #d1d8e0;
    border-right: none;
    color: #8420d4;
    padding: 0 1.1rem;
}

.form-control {
    border-radius: 0 15px 15px 0 !important; /* Completa o bloco do input-group */
    padding: 0.85rem 1.25rem;
    border: 1px solid #d1d8e0;
    transition: all 0.3s ease;
    font-size: 1rem;
    color: var(--dark);
}

.form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 0.25rem rgba(106,17,203,0.15);
    outline: none;
}

/* Estilo para a checkbox do Mostrar Senha */
.form-check-label {
    color: var(--dark);
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
}

.form-check-input:checked {
    background-color: var(--primary);
    border-color: var(--primary);
}

.btn-login {
    background: var(--gradient-primary);
    color: white;
    font-weight: 700;
    font-size: 1.1rem;
    padding: 0.95rem;
    border-radius: 50px;
    border: none;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(106,17,203,0.3);
}

.btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(106,17,203,0.45);
    background: var(--primary-light);
}

.btn-login:active {
    transform: translateY(-1px);
}

/* Links internos do container claro */
.link-cadastro {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
}

.link-cadastro:hover {
    color: var(--primary-light);
    text-decoration: underline;
}

.alert {
    border-radius: 15px;
    margin-top: 1.2rem;
    font-size: 0.95rem;
}

/* ==========================================================================
   4. ANIMAÇÕES
   ========================================================================== */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ==========================================================================
   5. RESPONSIVIDADE FINA (MEDIA QUERIES)
   ========================================================================== */

/* Telemóveis normais e ecrãs pequenos */
@media (max-width: 576px) {
    body {
        padding: 1rem;
    }
    .login-container { 
        border-radius: 20px; 
    }
    .login-header { 
        padding: 2.8rem 1.5rem 2rem; 
    }
    .login-title { 
        font-size: 1.85rem; 
    }
    .login-subtitle {
        font-size: 1rem;
    }
    .login-body { 
        padding: 2rem 1.5rem 2.5rem; 
    }
    .btn-login { 
        font-size: 1.05rem; 
        padding: 0.85rem; 
    }
}

/* Telemóveis muito antigos ou ecrãs ultra-pequenos (ex: iPhone SE antigo) */
@media (max-width: 360px) {
    .login-title {
        font-size: 1.6rem;
    }
    .login-body {
        padding: 1.8rem 1.2rem 2rem;
    }
}

/* Correção para modo paisagem (telemóvel deitado) ou ecrãs com pouca altura */
@media (max-height: 650px) {
    body {
        align-items: flex-start; /* Permite o scroll natural para baixo sem cortar conteúdo */
    }
    .login-container {
        margin-top: 1rem;
        margin-bottom: 1rem;
    }
}



.btn-login, .btn-signup {
    background: var(--gradient-primary);
    color: white;
    font-weight: 600;           /* Reduzido de 700 para 600 (texto ligeiramente mais fino) */
    font-size: 1rem;            /* Reduzido de 1.15rem para 1rem */
    padding: 0.65rem 1.5rem;    /* Reduzido! Menos altura (0.65rem) e boa largura lateral */
    border-radius: 50px;
    border: none;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(106,17,203,0.25);
    width: 100%;
    min-height: 44px;           /* Altura mínima ideal e elegante para cliques em telemóveis */
}
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <img src="img/logo1.png" alt="NextLynx Tech" class="login-logo">
            <h1 class="login-title">Área Exclusiva</h1>
            <p class="login-subtitle">Mentoria e Apoio Personalizado</p>
        </div>

        <div class="login-body">
            <form id="loginForm">
                <div class="mb-4 position-relative">
                    <label for="emailLogin" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="emailLogin" placeholder="seu@email.com" required autofocus>
                    </div>
                </div>

                <div class="mb-4 position-relative">
                    <label for="senhaLogin" class="form-label">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="senhaLogin" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="d-flex justify-content-start align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="showPassword">
                        <label class="form-check-label" for="showPassword">Mostrar senha</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login d-block mx-auto px-5">
    <i class="fas fa-sign-in-alt me-2"></i> Entrar na Área
</button>

                <div id="msgLogin" class="mt-3"></div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                    Ainda não tem conta? 
                    <a href="cadastro.html" class="link-cadastro">Criar conta</a>
                </p>
            </div>
        </div>
    </div>

<script>
    const checkboxShowPassword = document.getElementById('showPassword');
    const inputSenha = document.getElementById('senhaLogin');

    checkboxShowPassword.addEventListener('change', function() {
        if (this.checked) {
            inputSenha.type = 'text'; // Mostra o texto limpo
        } else {
            inputSenha.type = 'password'; // Volta a esconder com as bolinhas
        }
    });
</script>


<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
    'https://qgbblhwojxuknlhkeusy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnYmJsaHdvanh1a25saGtldXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5NTc1NjYsImV4cCI6MjA3ODUzMzU2Nn0.YpI8xjMqpwJSjHnrvOHfABnyMeIfxsLGJNeXrFoB3p0'
);

const loginForm = document.getElementById('loginForm');
const msg = document.getElementById('msgLogin');

let redirecionando = false; 

/* ==========================================================
   🔹 MENSAGENS COM TEMPO PARA SUMIR (5 SEGUNDOS)
   ========================================================== */
function showMsg(text, type = 'info') {
    msg.innerHTML = `<div class="alert alert-${type} mt-3">${text}</div>`;

    // Se for uma mensagem de Sucesso ou Informação, ela desaparece após 5 segundos
    if (type === 'success' || type === 'info') {
        setTimeout(() => {
            msg.innerHTML = '';
        }, 5000); // 5000ms = 5 segundos
    }
}

/* ==========================================================
   🔹 DESTINO POR ROLE
   ========================================================== */
function destinoPorRole(role) {
    if (role === 'admin') return 'admin-dashboard.html';
    if (role === 'tutor' || role === 'mentor') return 'tutores.html';
    return 'aluno.html';
}

/* ==========================================================
   🔹 REDIRECIONAR SEGURO
   ========================================================== */
async function redirecionarSeguro(userId) {
    if (redirecionando) return;
    redirecionando = true;

    console.log('🔄 Buscando role...');

    const { data: perfil } = await supabase
        .from('perfis')
        .select('role')
        .eq('id', userId)
        .maybeSingle();

    const role = perfil?.role || 'aluno';
    const destino = destinoPorRole(role);

    showMsg(`Bem-vindo! A redirecionar... (${role})`, 'success');

    setTimeout(() => {
        window.location.href = destino;
    }, 900);
}

/* ==========================================================
   🔹 LOGIN MANUAL
   ========================================================== */
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (redirecionando) return;

    const email = document.getElementById('emailLogin').value.trim();
    const password = document.getElementById('senhaLogin').value;

    if (!email || !password) {
        showMsg('Preencha email e senha.', 'danger');
        return;
    }

    showMsg('A autenticar...', 'info');

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        console.error(error);
        let texto = error.message;
        if (texto.includes('Invalid login credentials')) texto = 'Email ou senha incorretos.';
        if (texto.includes('Email not confirmed')) texto = 'Email não confirmado.';
        showMsg(texto, 'danger');
        return;
    }

    if (!data?.user) {
        showMsg('Falha ao obter utilizador.', 'danger');
        return;
    }

    console.log('✅ Login OK:', data.user.email);
    await redirecionarSeguro(data.user.id);
});

/* ==========================================================
   🔹 VERIFICAR SESSÃO AO CARREGAR
   ========================================================== */
(async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return;

    const paginaLogin = window.location.pathname.includes('login');
    if (paginaLogin) {
        console.log('Sessão existe mas estamos no login — não redireciona.');
        return;
    }

    console.log('Sessão ativa detectada');
    await redirecionarSeguro(session.user.id);
})();
</script>

</body>
</html>
